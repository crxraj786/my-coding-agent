name: 🤖 Smart Auto-Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  detect-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v3

      - name: Detect Project Type
        id: detect
        run: |
          TYPE="unknown"
          if [ -f "package.json" ]; then
            if grep -qi "expo\|react-native" package.json; then
              TYPE="mobile"
            elif grep -qi "express\|fastapi\|flask\|supabase" package.json; then
              TYPE="backend"
            elif grep -qi "react\|next\|vite\|html" package.json; then
              TYPE="web"
            fi
          fi
          [ -f ".deploy-as-mobile" ] && TYPE="mobile"
          [ -f ".deploy-as-backend" ] && TYPE="backend"
          [ -f ".deploy-as-web" ] && TYPE="web"
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "🎯 Detected: $TYPE"

      - name: Deploy to Vercel
        if: steps.detect.outputs.type == 'web'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "🚀 Deploying Web to Vercel..."
          npm install -g vercel
          vercel --prod --token $VERCEL_TOKEN --yes || echo "⚠️ Vercel deploy skipped"

      - name: Deploy to Expo EAS
        if: steps.detect.outputs.type == 'mobile'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "🚀 Triggering Expo Build..."
          npm install -g eas-cli
          eas build --platform android --profile production --non-interactive --no-wait || echo "⚠️ Expo build queued"

      - name: Deploy to Render
        if: steps.detect.outputs.type == 'backend'
        env:
          RENDER_TOKEN: ${{ secrets.RENDER_TOKEN }}
        run: |
          echo "🚀 Deploying Backend to Render..."
          curl -X POST "https://api.render.com/v1/services/deploy" \
            -H "Authorization: Bearer $RENDER_TOKEN" || echo "⚠️ Render deploy skipped"

      - name: Deployment Complete
        run: |
          echo "✅ Smart Deploy Finished"
          echo "📦 Type: ${{ steps.detect.outputs.type }}"
