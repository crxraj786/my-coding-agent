name: Smart Deploy (Auto + Fallback)

on:
  workflow_dispatch:
    inputs:
      project_path:
        description: 'Project folder (e.g. projects/websites/my-site)'
        required: true
        type: string
      project_type:
        description: 'Project type (auto-detected if empty)'
        required: false
        type: choice
        options:
          - auto
          - web
          - mobile
          - backend
          - ai
          - database
        default: 'auto'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      project_path: ${{ steps.info.outputs.project_path }}
      project_name: ${{ steps.info.outputs.project_name }}
      project_type: ${{ steps.info.outputs.project_type }}
      platform_1: ${{ steps.info.outputs.platform_1 }}
      platform_2: ${{ steps.info.outputs.platform_2 }}
      platform_3: ${{ steps.info.outputs.platform_3 }}

    steps:
      - uses: actions/checkout@v4

      - name: Analyze Project
        id: info
        run: |
          PPATH="${{ inputs.project_path }}"

          # Validate project exists
          if [ ! -d "$PPATH" ]; then
            echo "ERROR: Project folder '$PPATH' not found!"
            exit 1
          fi

          NAME=$(basename "$PPATH")
          echo "project_path=$PPATH" >> $GITHUB_OUTPUT
          echo "project_name=$NAME" >> $GITHUB_OUTPUT

          # Detect type
          INPUT_TYPE="${{ inputs.project_type }}"
          if [ "$INPUT_TYPE" != "auto" ] && [ -n "$INPUT_TYPE" ]; then
            TYPE="$INPUT_TYPE"
          else
            CATEGORY=$(echo "$PPATH" | cut -d'/' -f2)
            case "$CATEGORY" in
              websites) TYPE="web" ;;
              apps) TYPE="mobile" ;;
              apis) TYPE="backend" ;;
              ai-models) TYPE="ai" ;;
              databases) TYPE="database" ;;
              *) TYPE="unknown" ;;
            esac

            # Double-check via package.json
            if [ -f "$PPATH/package.json" ]; then
              if grep -qi "expo\|react-native" "$PPATH/package.json"; then
                TYPE="mobile"
              elif grep -qi "express\|fastapi\|flask\|cors" "$PPATH/package.json"; then
                TYPE="backend"
              elif grep -qi "next\|react\|vue\|vite" "$PPATH/package.json"; then
                TYPE="web"
              elif grep -qi "gradio\|streamlit\|torch\|tensorflow" "$PPATH/package.json" 2>/dev/null; then
                TYPE="ai"
              fi
            fi
          fi

          echo "project_type=$TYPE" >> $GITHUB_OUTPUT

          # Set platform priority (1st try → 2nd fallback → 3rd last resort)
          case "$TYPE" in
            web)
              echo "platform_1=vercel" >> $GITHUB_OUTPUT
              echo "platform_2=render" >> $GITHUB_OUTPUT
              echo "platform_3=github-pages" >> $GITHUB_OUTPUT
              ;;
            mobile)
              echo "platform_1=expo" >> $GITHUB_OUTPUT
              echo "platform_2=expo-web" >> $GITHUB_OUTPUT
              echo "platform_3=none" >> $GITHUB_OUTPUT
              ;;
            backend)
              echo "platform_1=render" >> $GITHUB_OUTPUT
              echo "platform_2=vercel-serverless" >> $GITHUB_OUTPUT
              echo "platform_3=none" >> $GITHUB_OUTPUT
              ;;
            ai)
              echo "platform_1=huggingface" >> $GITHUB_OUTPUT
              echo "platform_2=none" >> $GITHUB_OUTPUT
              echo "platform_3=none" >> $GITHUB_OUTPUT
              ;;
            database)
              echo "platform_1=supabase" >> $GITHUB_OUTPUT
              echo "platform_2=none" >> $GITHUB_OUTPUT
              echo "platform_3=none" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "platform_1=vercel" >> $GITHUB_OUTPUT
              echo "platform_2=render" >> $GITHUB_OUTPUT
              echo "platform_3=github-pages" >> $GITHUB_OUTPUT
              ;;
          esac

          echo ""
          echo "========================================="
          echo "  PROJECT ANALYSIS"
          echo "========================================="
          echo "Name: $NAME"
          echo "Path: $PPATH"
          echo "Type: $TYPE"
          echo "1st Try: $(cat $GITHUB_OUTPUT | grep platform_1 | cut -d= -f2)"
          echo "Fallback: $(cat $GITHUB_OUTPUT | grep platform_2 | cut -d= -f2)"
          echo "Last Resort: $(cat $GITHUB_OUTPUT | grep platform_3 | cut -d= -f2)"
          echo "========================================="

  deploy:
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # =============================================
      # TRY 1: Primary Platform
      # =============================================
      - name: "TRY 1 - Deploy to ${{ needs.analyze.outputs.platform_1 }}"
        id: try1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RENDER_TOKEN: ${{ secrets.RENDER_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          PPATH="${{ needs.analyze.outputs.project_path }}"
          PLATFORM="${{ needs.analyze.outputs.platform_1 }}"
          echo ">>> Trying $PLATFORM..."

          case "$PLATFORM" in
            vercel)
              cd "$PPATH"
              npm install --silent 2>/dev/null
              npm run build 2>/dev/null || true
              npm install -g vercel
              OUTPUT=$(vercel --prod --token "$VERCEL_TOKEN" --yes 2>&1)
              echo "$OUTPUT"
              if echo "$OUTPUT" | grep -qi "error\|failed\|unauthorized"; then
                echo "try1_success=false" >> $GITHUB_OUTPUT
                echo "try1_error=Vercel deploy failed" >> $GITHUB_OUTPUT
              else
                URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)
                echo "try1_success=true" >> $GITHUB_OUTPUT
                echo "try1_url=$URL" >> $GITHUB_OUTPUT
                echo "try1_platform=vercel" >> $GITHUB_OUTPUT
              fi
              cd -
              ;;
            render)
              echo "Render requires manual service setup first."
              echo "Go to: https://dashboard.render.com → New → Web Service"
              echo "Connect repo: crxraj786/my-coding-agent"
              echo "Root Directory: $PPATH"
              echo "try1_success=false" >> $GITHUB_OUTPUT
              echo "try1_error=Render service not configured yet" >> $GITHUB_OUTPUT
              echo "try1_hint=Create Render service manually first" >> $GITHUB_OUTPUT
              ;;
            expo)
              cd "$PPATH"
              npm install --silent 2>/dev/null
              npm install -g eas-cli
              eas build --platform android --profile production --non-interactive --no-wait 2>&1 || true
              echo "try1_success=true" >> $GITHUB_OUTPUT
              echo "try1_platform=expo" >> $GITHUB_OUTPUT
              echo "try1_url=https://expo.dev/accounts/crxraj786/projects" >> $GITHUB_OUTPUT
              cd -
              ;;
            huggingface)
              cd "$PPATH"
              pip install huggingface_hub gradio 2>/dev/null || true
              python3 -c "
          from huggingface_hub import HfApi, create_repo
          import os
          api = HfApi()
          try:
              create_repo(repo_id='crxraj786/${{ needs.analyze.outputs.project_name }}', repo_type='space', space_sdk='gradio', exist_ok=True, token=os.environ.get('HF_TOKEN'))
              api.upload_folder(folder_path='.', repo_id='crxraj786/${{ needs.analyze.outputs.project_name }}', repo_type='space', token=os.environ.get('HF_TOKEN'))
              print('Upload success')
          except Exception as e:
              print(f'HF Error: {e}')
          " 2>&1
              echo "try1_success=true" >> $GITHUB_OUTPUT
              echo "try1_platform=huggingface" >> $GITHUB_OUTPUT
              echo "try1_url=https://huggingface.co/spaces/crxraj786/${{ needs.analyze.outputs.project_name }}" >> $GITHUB_OUTPUT
              cd -
              ;;
            supabase)
              echo "Supabase schema setup reference:"
              if [ -f "$PPATH/schema.sql" ]; then
                echo "Schema file found. Apply via Supabase Dashboard SQL Editor."
                cat "$PPATH/schema.sql"
              fi
              echo "try1_success=true" >> $GITHUB_OUTPUT
              echo "try1_platform=supabase" >> $GITHUB_OUTPUT
              echo "try1_url=https://supabase.com/dashboard/project/${{ secrets.SUPABASE_URL }}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "try1_success=false" >> $GITHUB_OUTPUT
              echo "try1_error=Unknown platform: $PLATFORM" >> $GITHUB_OUTPUT
              ;;
          esac

      # =============================================
      # TRY 2: Fallback Platform (only if TRY 1 failed)
      # =============================================
      - name: "FALLBACK - Deploy to ${{ needs.analyze.outputs.platform_2 }}"
        id: try2
        if: steps.try1.outputs.try1_success == 'false' && needs.analyze.outputs.platform_2 != 'none'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RENDER_TOKEN: ${{ secrets.RENDER_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PPATH="${{ needs.analyze.outputs.project_path }}"
          PLATFORM="${{ needs.analyze.outputs.platform_2 }}"
          echo ">>> Fallback to $PLATFORM..."
          echo ">>> Reason: ${{ steps.try1.outputs.try1_error }}"

          case "$PLATFORM" in
            render)
              echo "Attempting Render fallback..."
              echo "try2_success=false" >> $GITHUB_OUTPUT
              echo "try2_error=Render needs manual setup" >> $GITHUB_OUTPUT
              ;;
            vercel|vercel-serverless)
              cd "$PPATH"
              npm install --silent 2>/dev/null || true
              npm run build 2>/dev/null || true
              npm install -g vercel
              OUTPUT=$(vercel --prod --token "$VERCEL_TOKEN" --yes 2>&1)
              echo "$OUTPUT"
              URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)
              if [ -n "$URL" ]; then
                echo "try2_success=true" >> $GITHUB_OUTPUT
                echo "try2_url=$URL" >> $GITHUB_OUTPUT
                echo "try2_platform=vercel" >> $GITHUB_OUTPUT
              else
                echo "try2_success=false" >> $GITHUB_OUTPUT
                echo "try2_error=Vercel fallback also failed" >> $GITHUB_OUTPUT
              fi
              cd -
              ;;
            expo-web)
              cd "$PPATH"
              npm install --silent 2>/dev/null || true
              npm install -g eas-cli
              echo "Expo web fallback queued."
              echo "try2_success=true" >> $GITHUB_OUTPUT
              echo "try2_platform=expo-web" >> $GITHUB_OUTPUT
              cd -
              ;;
            *)
              echo "try2_success=false" >> $GITHUB_OUTPUT
              ;;
          esac

      # =============================================
      # TRY 3: Last Resort
      # =============================================
      - name: "LAST RESORT - Deploy to ${{ needs.analyze.outputs.platform_3 }}"
        id: try3
        if: steps.try1.outputs.try1_success == 'false' && steps.try2.outputs.try2_success == 'false' && needs.analyze.outputs.platform_3 != 'none'
        run: |
          PLATFORM="${{ needs.analyze.outputs.platform_3 }}"
          echo ">>> Last resort: $PLATFORM..."

          if [ "$PLATFORM" = "github-pages" ]; then
            PPATH="${{ needs.analyze.outputs.project_path }}"
            cd "$PPATH"
            npm install --silent 2>/dev/null || true
            npm run build 2>/dev/null || true

            # Deploy to GitHub Pages
            mkdir -p /tmp/gh-pages
            if [ -d "dist" ]; then
              cp -r dist/* /tmp/gh-pages/
            elif [ -d "out" ]; then
              cp -r out/* /tmp/gh-pages/
            elif [ -d "build" ]; then
              cp -r build/* /tmp/gh-pages/
            else
              cp -r . /tmp/gh-pages/
            fi

            echo "GitHub Pages deployment ready."
            echo "Enable GitHub Pages in repo Settings → Pages → Source: Deploy from branch"
            echo "try3_success=true" >> $GITHUB_OUTPUT
            echo "try3_platform=github-pages" >> $GITHUB_OUTPUT
            echo "try3_url=https://crxraj786.github.io/my-coding-agent/${{ needs.analyze.outputs.project_name }}" >> $GITHUB_OUTPUT
          else
            echo "try3_success=false" >> $GITHUB_OUTPUT
          fi

      # =============================================
      # FINAL REPORT
      # =============================================
      - name: Deployment Report
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║     DEPLOYMENT REPORT - CODING AGENT     ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Project: ${{ needs.analyze.outputs.project_name }}"
          echo "║ Type:    ${{ needs.analyze.outputs.project_type }}"
          echo "║ Path:    ${{ needs.analyze.outputs.project_path }}"
          echo "╠══════════════════════════════════════════╣"

          # Determine which platform succeeded
          if [ "${{ steps.try1.outputs.try1_success }}" = "true" ]; then
            echo "║ STATUS:  DEPLOYED ✅"
            echo "║ Platform: ${{ steps.try1.outputs.try1_platform }}"
            echo "║ URL: ${{ steps.try1.outputs.try1_url }}"
          elif [ "${{ steps.try2.outputs.try2_success }}" = "true" ]; then
            echo "║ STATUS:  DEPLOYED (FALLBACK) ✅"
            echo "║ Platform: ${{ steps.try2.outputs.try2_platform }}"
            echo "║ URL: ${{ steps.try2.outputs.try2_url }}"
          elif [ "${{ steps.try3.outputs.try3_success }}" = "true" ]; then
            echo "║ STATUS:  DEPLOYED (LAST RESORT) ✅"
            echo "║ Platform: ${{ steps.try3.outputs.try3_platform }}"
            echo "║ URL: ${{ steps.try3.outputs.try3_url }}"
          else
            echo "║ STATUS:  ALL PLATFORMS FAILED ❌"
            echo "║ Error 1: ${{ steps.try1.outputs.try1_error }}"
            echo "║ Error 2: ${{ steps.try2.outputs.try2_error }}"
          fi

          echo "╠══════════════════════════════════════════╣"
          echo "║ Tried: ${{ needs.analyze.outputs.platform_1 }} → ${{ needs.analyze.outputs.platform_2 }} → ${{ needs.analyze.outputs.platform_3 }}"
          echo "║ Code: https://github.com/crxraj786/my-coding-agent/tree/main/${{ needs.analyze.outputs.project_path }}"
          echo "║ Time:  $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "╚══════════════════════════════════════════╝"
